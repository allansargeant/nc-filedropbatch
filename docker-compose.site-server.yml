services:
  site_db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${SITE_DB_ROOT_PASSWORD:?set SITE_DB_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${SITE_DB_PASSWORD:?set SITE_DB_PASSWORD in .env}
    volumes:
      - site_db:/var/lib/mysql

  site:
    image: nextcloud:30-apache
    restart: unless-stopped
    depends_on:
      - site_db
    ports:
      - "8081:80"
    environment:
      MYSQL_HOST: site_db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${SITE_DB_PASSWORD:?set SITE_DB_PASSWORD in .env}
      NEXTCLOUD_ADMIN_USER: ${SITE_ADMIN_USER:-siteadmin}
      NEXTCLOUD_ADMIN_PASSWORD: ${SITE_ADMIN_PASSWORD:?set SITE_ADMIN_PASSWORD in .env}
      NEXTCLOUD_TRUSTED_DOMAINS: localhost
      PHP_UPLOAD_LIMIT: 64M
    volumes:
      - site_nextcloud:/var/www/html

volumes:
  site_db:
  site_nextcloud:
